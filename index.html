<!DOCTYPE html>
<html lang="en">
<head>
  <title>Tic Tac Toe</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    /* Page background and font */
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f0f0f0;
      padding: 30px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    /* The 3x3 grid */
    table {
      margin: 20px auto;
      border-collapse: collapse;
    }

    td {
      width: 100px;
      height: 100px;
      font-size: 2.5rem;
      border: 3px solid #333;
      cursor: pointer;
      background-color: white;
    }

    /* Change cell color when hovered */
    td:hover {
      background-color: #e8e8ff;
    }

    /* Message shown at the end */
    #message {
      font-size: 1.4rem;
      font-weight: bold;
      margin: 15px 0;
      color: #333;
    }

    /* Restart button */
    #restartBtn {
      font-size: 1rem;
      padding: 10px 25px;
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    #restartBtn:hover {
      background-color: #3730a3;
    }
  </style>
</head>
<body>

  <h1>Tic Tac Toe</h1>
  <p>You = 🧑‍💻 &nbsp;|&nbsp; Robot = 🤖</p>

  <!-- Game board -->
  <table>
    <tr>
      <td onclick="humanClick(0)"></td>
      <td onclick="humanClick(1)"></td>
      <td onclick="humanClick(2)"></td>
    </tr>
    <tr>
      <td onclick="humanClick(3)"></td>
      <td onclick="humanClick(4)"></td>
      <td onclick="humanClick(5)"></td>
    </tr>
    <tr>
      <td onclick="humanClick(6)"></td>
      <td onclick="humanClick(7)"></td>
      <td onclick="humanClick(8)"></td>
    </tr>
  </table>

  <!-- Status message -->
  <div id="message">Your turn!</div>

  <!-- Restart button -->
  <button id="restartBtn" onclick="restartGame()">🔄 Restart</button>

  <script>
    // All 9 cells stored in an array
    var cells = document.querySelectorAll("td");

    // board[] stores who filled each cell: null = empty, "H" = human, "R" = robot
    var board = [null, null, null, null, null, null, null, null, null];

    // Is the game still going?
    var gameActive = true;

    // All winning combinations (by index)
    var winLines = [
      [0, 1, 2], // top row
      [3, 4, 5], // middle row
      [6, 7, 8], // bottom row
      [0, 3, 6], // left column
      [1, 4, 7], // middle column
      [2, 5, 8], // right column
      [0, 4, 8], // diagonal
      [2, 4, 6]  // diagonal
    ];

    // Called when human clicks a cell
    function humanClick(index) {
      // Ignore if game over or cell already taken
      if (!gameActive || board[index] !== null) return;

      // Mark the cell
      board[index] = "H";
      cells[index].textContent = "🧑‍💻";

      // Check if human won
      if (checkWinner("H")) {
        showMessage("🎉 You win!");
        gameActive = false;
        return;
      }

      // Check draw
      if (isBoardFull()) {
        showMessage("🤝 It's a draw!");
        gameActive = false;
        return;
      }

      // Robot's turn
      showMessage("🤖 Robot is thinking...");
      setTimeout(robotTurn, 500);
    }

    // Robot picks a random empty cell
    function robotTurn() {
      // Find all empty cells
      var emptyCells = [];
      for (var i = 0; i < board.length; i++) {
        if (board[i] === null) {
          emptyCells.push(i);
        }
      }

      // Pick one randomly
      var pick = emptyCells[Math.floor(Math.random() * emptyCells.length)];
      board[pick] = "R";
      cells[pick].textContent = "🤖";

      // Check if robot won
      if (checkWinner("R")) {
        showMessage("🤖 Robot wins!");
        gameActive = false;
        return;
      }

      // Check draw
      if (isBoardFull()) {
        showMessage("🤝 It's a draw!");
        gameActive = false;
        return;
      }

      showMessage("Your turn!");
    }

    // Check if a player has won
    function checkWinner(player) {
      for (var i = 0; i < winLines.length; i++) {
        var a = winLines[i][0];
        var b = winLines[i][1];
        var c = winLines[i][2];
        if (board[a] === player && board[b] === player && board[c] === player) {
          return true;
        }
      }
      return false;
    }

    // Check if all cells are filled
    function isBoardFull() {
      for (var i = 0; i < board.length; i++) {
        if (board[i] === null) return false;
      }
      return true;
    }

    // Show a message on screen
    function showMessage(text) {
      document.getElementById("message").textContent = text;
    }

    // Reset everything
    function restartGame() {
      board = [null, null, null, null, null, null, null, null, null];
      gameActive = true;
      for (var i = 0; i < cells.length; i++) {
        cells[i].textContent = "";
      }
      showMessage("Your turn!");
    }
  </script>

</body>
</html>
